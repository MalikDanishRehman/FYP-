version: '3.8'

services:
  # 1. Yeh tumhara C# .NET ka server hai
  web-backend:
    build: 
      context: .
      dockerfile: Dockerfile
    depends_on:
      - ai-agent
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      AI_AGENT_BASE_URL: http://ai-agent:8000/
    env_file:
      - ./AI_Driven_Water_Supply.Presentation/.env

  # 2. Yeh tumhara Python FastAPI (AI) ka server hai
  ai-agent:
    build:
      context: ./HydroAI.Backend  # <-- Yahan tumhara Python wala folder aa gaya
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./AI_Driven_Water_Supply.Presentation/.env